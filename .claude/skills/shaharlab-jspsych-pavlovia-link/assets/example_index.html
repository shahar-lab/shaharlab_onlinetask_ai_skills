<!doctype html>
<html lang="en">

<head>
	<title>Simple Reaction Time [jsPsych 7 + Pavlovia + Prolific]</title>
	<meta charset="UTF-8">

	<!-- jsPsych 7 core -->
	<script src="lib/jspsych/jspsych.js"></script>
	<link href="lib/jspsych/jspsych.css" rel="stylesheet" type="text/css" />

	<!-- lab Pavlovia plugin — loaded immediately after the core (Step 2 of the skill) -->
	<script src="lib/jspsych-7-pavlovia-2021.12.js"></script>

	<!-- task plugins, including the two the snippets rely on -->
	<script src="lib/jspsych/plugin-html-keyboard-response.js"></script>
	<script src="lib/jspsych/plugin-call-function.js"></script>
	<script src="lib/jspsych/plugin-fullscreen.js"></script>
</head>

<body>
	<script type='text/javascript'>

		/* the timeline exists before any snippet code runs */
		var timeline = [];

		/* ══ from assets/init_snippet.js — Step 3 of the skill ══════════════════ */

		let experimentEnded     = false;
		let blurCount           = 0;   // increments each time the window loses focus
		let fullscreenExitCount = 0;   // increments each time the user leaves fullscreen

		const jsPsych = initJsPsych({
			on_data_update: function (data) {
				jsPsych.data.addDataToLastTrial({
					blur_count:            blurCount,
					fullscreen_exit_count: fullscreenExitCount
				});
			},
			on_interaction_data_update: function (data) {
				if (data.event === 'blur' && !experimentEnded) {
					blurCount++;
					jsPsych.pauseExperiment();
					alert("The experiment is paused. If necessary please return to fullscreen by pressing F11 on your keyboard. Note that you will not be paid if you are not completely engaged with the experiment.");
				}
				if (data.event === 'focus' && !experimentEnded) {
					jsPsych.resumeExperiment();
				}
			}
		});

		document.addEventListener('fullscreenchange', function () {
			if (!document.fullscreenElement && !experimentEnded) {
				fullscreenExitCount++;
			}
		});

		const subject_id = jsPsych.data.getURLVariable('PROLIFIC_PID') || 'not_provided';
		const study_id   = jsPsych.data.getURLVariable('STUDY_ID')     || 'not_provided';

		// Device detection
		const ua = navigator.userAgent || '';
		const isMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|Tablet/i.test(ua);
		const isTouchOnly = (navigator.maxTouchPoints > 1) && (window.screen.width < 1024);
		const device_type = (isMobileUA || isTouchOnly) ? 'mobile_or_tablet' : 'desktop';

		jsPsych.data.addProperties({ subject_id, study_id, device_type });

		// Pavlovia init — FIRST trial in the timeline
		timeline.push({ type: jsPsychPavlovia, command: 'init' });

		/* ══ the experiment itself ══════════════════════════════════════════════ */

		timeline.push({
			type: jsPsychFullscreen,
			fullscreen_mode: true,
			message: '<p>The experiment will switch to fullscreen. Press the button to continue.</p>'
		});

		timeline.push({
			type: jsPsychHtmlKeyboardResponse,
			stimulus: '<p>Press the letter <strong>J</strong> as fast as you can when the circle appears.</p><p>Press any key to begin.</p>',
			post_trial_gap: 1000
		});

		var fixation = {
			type: jsPsychHtmlKeyboardResponse,
			stimulus: '<div style="font-size:60px;">+</div>',
			choices: "NO_KEYS",
			trial_duration: function () {
				return jsPsych.randomization.sampleWithoutReplacement([500, 750, 1000, 1250], 1)[0];
			},
			data: { test_part: 'fixation' }
		};

		var target = {
			type: jsPsychHtmlKeyboardResponse,
			stimulus: '<div style="font-size:60px;">&#9679;</div>',
			choices: ['j'],
			data: { test_part: 'target' }
		};

		timeline.push({
			timeline: [fixation, target],
			repetitions: 5
		});

		timeline.push({
			type: jsPsychHtmlKeyboardResponse,
			stimulus: '<p>Thank you! Press any key to finish.</p>'
		});

		/* ══ from assets/prolific_finish_snippet.js — Step 4 of the skill ═══════ */

		// ─── PLACEHOLDERS — fill in before deploying ───────────────────────────
		const COMPLETION_CODE = 'PASTE_PROLIFIC_CODE_HERE'; // from the study page on Prolific
		const ON_PAVLOVIA     = true;                       // true when deployed; drive from environment for local runs

		// Mark experiment as ended before exiting fullscreen
		timeline.push({ type: jsPsychCallFunction, func: function () { experimentEnded = true; } });

		// Exit fullscreen
		timeline.push({ type: jsPsychFullscreen, fullscreen_mode: false });

		// Pavlovia finish (skipped when running locally) — LAST trial in the timeline
		if (ON_PAVLOVIA) {
			var pavlovia_finish = {
				type: jsPsychPavlovia,
				command: "finish",
				participantId: subject_id,
				on_finish: function () {
					document.body.innerHTML = '<p style="text-align:center; color:#ffffff; font-family:Calibri,sans-serif; font-size:22px; margin-top:40vh;"> Please wait. You will be redirected back to Prolific in a few moments. <br><br> If you get a pop-up warning you "data may not be saved", you can click "leave", your data have already been saved.</p>';
					setTimeout(function () {
						location.href = 'https://app.prolific.com/submissions/complete?cc=' + COMPLETION_CODE;
						document.body.innerHTML = '<p style="color:#ffffff; font-family:Calibri,sans-serif; font-size:22px;">If you are not automatically redirected, please click here: <a href="https://app.prolific.com/submissions/complete?cc=' + COMPLETION_CODE + '" style="color:#FFD700;">https://app.prolific.com/submissions/complete?cc=' + COMPLETION_CODE + '</a></p><p style="color:#ffffff; font-family:Calibri,sans-serif;">If you get a pop-up warning you "data may not be saved", you can click "leave", your data have already been saved.</p>';
					}, 5000);
				}
			};
			timeline.push(pavlovia_finish);
		}

		/* start the experiment */
		jsPsych.run(timeline);

	</script>
</body>

</html>
